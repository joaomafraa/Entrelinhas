{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Area da Aluna | EntreLinhas{% endblock %}</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{% static 'css/main.css' %}?v=11"
    >
</head>

<body class="admin-body">
    <div class="admin-shell student-shell">
        {% include 'inscricoes/student_sidebar.html' %}

        <main class="admin-main">
            {% if messages %}
                <div class="admin-messages">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} mb-3">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
