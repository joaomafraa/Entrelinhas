{% extends 'inscricoes/base.html' %}

{% block content %}

<div class="card shadow p-4">

    <h2 class="mb-4">
        Editar Matrícula
    </h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button
            type="submit"
            class="btn btn-warning"
        >
            Salvar Alterações
        </button>

    </form>

</div>

{% endblock %}
