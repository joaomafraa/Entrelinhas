{% extends 'inscricoes/base.html' %}

{% block title %}Editar inscrição | EntreLinhas{% endblock %}

{% block content %}

<section class="page-section">
    <div class="container layout-narrow">
        <div class="card shadow p-4">
            <span class="section-label">Curso Costurando Sonhos</span>
            <h2 class="mt-2 mb-4">Editar inscrição</h2>

            <form method="POST">
                {% csrf_token %}

                <div class="form-stack">
                    {% include 'inscricoes/_inscricao_form_fields.html' %}
                </div>

                <button
                    type="submit"
                    class="btn btn-primary mt-4"
                >
                    Salvar alterações
                </button>
            </form>
        </div>
    </div>
</section>

{% endblock %}
